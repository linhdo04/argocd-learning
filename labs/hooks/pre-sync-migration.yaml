apiVersion: batch/v1
kind: Job
metadata:
  name: demo-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: busybox:1.37.0
          command:
            - sh
            - -ec
            - |
              echo "Mô phỏng database migration idempotent"
              sleep 3
              echo "Migration hoàn tất"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
