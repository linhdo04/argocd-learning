apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-auto
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo
  source:
    repoURL: https://github.com/linhdo04/argocd-learning.git
    targetRevision: main
    path: labs/base
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-auto
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - FailOnSharedResource=true
