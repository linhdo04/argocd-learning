apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-environments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - list:
        elements:
          - environment: dev
            path: labs/overlays/dev
          - environment: staging
            path: labs/overlays/staging
  template:
    metadata:
      name: 'demo-{{.environment}}'
      labels:
        environment: '{{.environment}}'
    spec:
      project: demo
      source:
        repoURL: https://github.com/linhdo04/argocd-learning.git
        targetRevision: main
        path: '{{.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'demo-{{.environment}}'
      syncPolicy:
        automated:
          enabled: true
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - FailOnSharedResource=true
